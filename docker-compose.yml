services:
  bot:
    build: ./bot
    container_name: it_bot_max
    restart: always
    env_file: .env
    depends_on:
      - backend
      - redis
    volumes:
      - ./uploads:/app/uploads   # for user photos

  bot_webhook:
    build: ./bot
    container_name: it_bot_webhook
    restart: always
    command: python bot/webhook.py
    env_file: .env
    depends_on:
      - backend
      - redis
    ports:
      - "8081:8080"

  backend:
    build: ./backend
    container_name: it_bot_backend
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - chromadb
    volumes:
      - ./documents:/app/documents   # admin uploaded documents
      - ./uploads:/app/uploads
    logging:
      driver: journald
      options:
        tag: "it-bot-backend"

  ollama:
    image: ollama/ollama:latest
    container_name: it_bot_ollama
    restart: always
    ports:
      - "11434:11434"
    environment:
      # Заставляем использовать все ядра (6 ядер * 2 потока = 12)
      OLLAMA_NUM_THREAD: "6" 
      # Оставляем модель в памяти навсегда
      OLLAMA_KEEP_ALIVE: "-1"
      # Максимальное кол-во одновременных запросов
      OLLAMA_NUM_PARALLEL: "1"
      # Загружаем максимум слоев модели в GPU (до 6 ГБ VRAM)
      OLLAMA_NUM_GPU: "99"
      # Включаем Flash Attention для ускорения обработки контекста
      OLLAMA_FLASH_ATTENTION: "1"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 16G
        reservations:
          cpus: '4.0'
          memory: 8G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    container_name: it_bot_postgres
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: it_bot_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: it_bot_chromadb
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  chroma_data:
