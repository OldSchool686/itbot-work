<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Support Bot — Swagger UI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
    <style>
        body { margin: 0; padding: 0; }
        .top-bar { background: #1b2838; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
        .top-bar a { color: #7ec8e3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/admin">&larr; Назад в панель управления</a>
        <span>Swagger UI — API Documentation</span>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        window.onload = () => {
            SwaggerUIBundle({
                url: '/admin/openapi.json',
                dom_id: '#swagger-ui',
                presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
                layout: 'BaseLayout',
                oauth2RedirectUrl: window.location.origin + '/oauth2-redirect.html',
            });
        };
    </script>
</body>
</html>
